name: Build site

on:
  push:
    paths:
      - "content/**"
      - "scripts/**"
  workflow_dispatch:

concurrency:
  group: build-site
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild site from content"
          file_pattern: "*.html **/*.html"
